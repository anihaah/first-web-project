<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard App</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: #0d1117; color: #c9d1d9; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 30px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .time { font-size: 2.5rem; font-weight: 700; color: #38bdf8; margin: 10px 0; }
        .date { font-size: 0.9rem; color: #8b949e; margin-bottom: 25px; }
        .todo-section { text-align: left; }
        .input-box { display: flex; gap: 8px; margin-bottom: 15px; }
        input { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: #fff; outline: none; }
        button { background: #38bdf8; color: #0d1117; border: none; padding: 10px 15px; border-radius: 6px; font-weight: 600; cursor: pointer; }
        ul { list-style: none; }
        li { background: #21262d; padding: 10px; border-radius: 6px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; }
        .delete-btn { background: transparent; color: #f85149; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div id="clock" class="time">00:00:00</div>
    <div id="date" class="date">Loading date...</div>

    <div class="todo-section">
        <h3 style="margin-bottom: 10px; font-size: 1rem; color: #e6edf3;">Tasks</h3>
        <div class="input-box">
            <input type="text" id="taskInput" placeholder="Add a new task...">
            <button onclick="addTask()">Add</button>
        </div>
        <ul id="taskList"></ul>
    </div>
</div>

<script>
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString();
        document.getElementById('date').innerText = now.toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric', year: 'numeric' });
    }
    setInterval(updateClock, 1000);
    updateClock();

    function addTask() {
        const input = document.getElementById('taskInput');
        if (input.value.trim() === '') return;
        
        const li = document.createElement('li');
        li.innerHTML = `${input.value} <button class="delete-btn" onclick="this.parentElement.remove()">✕</button>`;
        document.getElementById('taskList').appendChild(li);
        input.value = '';
    }
</script>

</body>
</html>
